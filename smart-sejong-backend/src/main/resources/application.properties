spring.application.name=smart-sejong
spring.jpa.open-in-view=false

# [H2 Database - File Mode]
spring.datasource.url=jdbc:h2:file:./data/smartsejong;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# [JWT Configuration]
jwt.secret=${JWT_SECRET:default-secret-key-for-development-only-change-in-production-32chars}
jwt.access-token-validity=3600000
jwt.refresh-token-validity=604800000
