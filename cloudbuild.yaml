steps:
  # Backend build and push
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/smart-sejong-backend', './smart-sejong-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/smart-sejong-backend']

  # Frontend build and push
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--build-arg', 'VITE_API_BASE_URL=${_BACKEND_URL}',
      '-t', 'gcr.io/$PROJECT_ID/smart-sejong-frontend',
      './smart-sejong-frontend'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/smart-sejong-frontend']

  # Backend Cloud Run deploy
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'smart-sejong-backend',
      '--image', 'gcr.io/$PROJECT_ID/smart-sejong-backend',
      '--region', 'asia-northeast3',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--set-env-vars', 'DB_HOST=${_DB_HOST},DB_NAME=${_DB_NAME},DB_USER=${_DB_USER},DB_PASSWORD=${_DB_PASSWORD},JWT_SECRET=${_JWT_SECRET}'
    ]

  # Frontend Cloud Run deploy
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'smart-sejong-frontend',
      '--image', 'gcr.io/$PROJECT_ID/smart-sejong-frontend',
      '--region', 'asia-northeast3',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

substitutions:
  _BACKEND_URL: 'https://smart-sejong-backend-xxxxx.asia-northeast3.run.app'
  _DB_HOST: ''
  _DB_NAME: 'smartsejong'
  _DB_USER: ''
  _DB_PASSWORD: ''
  _JWT_SECRET: ''

images:
  - 'gcr.io/$PROJECT_ID/smart-sejong-backend'
  - 'gcr.io/$PROJECT_ID/smart-sejong-frontend'
